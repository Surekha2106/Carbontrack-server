version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: carbontrack_db
    environment:
      POSTGRES_DB: carbontrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 906630
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carbontrack_redis
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./carbontrack
      dockerfile: Dockerfile
    container_name: carbontrack_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/carbontrack
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbontrack_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
